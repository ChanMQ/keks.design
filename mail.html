<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Открытие почты</title>
    <style>
        /* Строгий и чистый стиль, подходящий под современный веб */
        body {
            background-color: #0A0A0A; /* Глубокий солидный темный цвет */
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .text {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #888888;
        }
        /* Минималистичный SVG-лоадер */
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #333333;
            border-top: 2px solid #FFFFFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Ссылка на случай, если почта не открылась автоматически */
        .fallback {
            margin-top: 20px;
            font-size: 12px;
            color: #555555;
        }
        .fallback a {
            color: #888888;
            text-decoration: underline;
        }
        .fallback a:hover {
            color: #FFFFFF;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <div class="text">Открываем почтовый клиент...</div>
        <div class="fallback" id="fallback-msg" style="display: none;">
            Не открылось автоматически? <a id="manual-link" href="#">Нажмите здесь</a>
        </div>
    </div>

    <script>
        // Читаем email из адресной строки (из параметра ?to=...)
        const urlParams = new URLSearchParams(window.location.search);
        const userEmail = urlParams.get('to');

        setTimeout(() => {
            if (userEmail) {
                // Формируем ссылку mailto
                const mailtoLink = `mailto:${encodeURIComponent(userEmail)}`;

                // Пробуем открыть почтовый клиент
                window.location.href = mailtoLink;

                // Показываем запасную ссылку через пару секунд,
                // так как страница не закроется сама при вызове mailto
                setTimeout(() => {
                    const fallbackMsg = document.getElementById('fallback-msg');
                    const manualLink = document.getElementById('manual-link');
                    manualLink.href = mailtoLink;
                    fallbackMsg.style.display = 'block';
                    document.querySelector('.spinner').style.display = 'none';
                    document.querySelector('.text').innerText = 'Почтовый клиент должен был открыться.';
                }, 2000);

            } else {
                // Если зашли без почты — кидаем на главную
                window.location.href = '/';
            }
        }, 600);
    </script>

</body>
</html>
